version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: secure_upload_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       secure_upload
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secure_upload"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: secure_upload_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── ClamAV ────────────────────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:latest
    container_name: secure_upload_clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_db:/var/lib/clamav
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    healthcheck:
      # clamdcheck returns 0 when the daemon is ready
      test: ["CMD", "clamdcheck"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 120s   # give freshclam time to download DB on first run

volumes:
  postgres_data:
  redis_data:
  clamav_db:
